<!-- Manifest (inline via blob) -->
<script>
const manifest = {
  name: "Mon Jardin d'Agrumes",
  short_name: "Mes Agrumes",
  description: "Suivi complet de mes agrumes : serre, pots, pleine terre",
  start_url: ".",
  display: "standalone",
  background_color: "#F7F3ED",
  theme_color: "#E8820C",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍋</text></svg>", sizes: "any", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23E8820C' width='100' height='100' rx='20'/><text y='.9em' x='10' font-size='80'>🍋</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F7F3ED;
  --card: #FFFFFF;
  --accent: #E8820C;
  --accent-light: #FFF3E0;
  --green: #4A7C59;
  --green-light: #E8F0EA;
  --red: #C0392B;
  --red-light: #FDEAEA;
  --blue: #2980B9;
  --blue-light: #E8F4FD;
  --text: #2C2416;
  --text-muted: #8B7D6B;
  --border: #E8E0D4;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  padding-bottom: 72px;
}

/* ── Splash Screen ── */
.splash {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(145deg, #E8820C, #D4740A);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .6s, transform .6s;
}
.splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
.splash-icon { font-size: 72px; animation: bounce 1.2s ease infinite; }
.splash-title { color: #fff; font-size: 24px; font-weight: 700; margin-top: 16px; }
.splash-sub { color: rgba(255,255,255,.75); font-size: 13px; margin-top: 6px; }
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #E8820C 0%, #C96A08 100%);
  color: #fff;
  padding: 20px 20px 16px;
  padding-top: max(20px, env(safe-area-inset-top, 20px));
  border-radius: 0 0 24px 24px;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header-sub { font-size: 13px; opacity: .85; margin-top: 2px; }

/* ── Navigation ── */
.nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: #fff;
  display: flex; justify-content: space-around;
  padding: 6px 0 max(10px, env(safe-area-inset-bottom, 10px));
  border-top: 1px solid var(--border);
  z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; padding: 4px 12px;
  cursor: pointer; font-size: 11px; font-family: inherit;
  color: var(--text-muted); transition: color .2s;
}
.nav-btn.active { color: var(--accent); font-weight: 600; }
.nav-btn svg { width: 22px; height: 22px; }

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(44,36,22,.07);
  border: 1px solid var(--border);
  transition: transform .15s, box-shadow .15s;
}
.card-tap:active { transform: scale(.98); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.badge-accent { color: var(--accent); background: var(--accent-light); }
.badge-green { color: var(--green); background: var(--green-light); }
.badge-blue { color: var(--blue); background: var(--blue-light); }
.badge-red { color: var(--red); background: var(--red-light); }

/* ── Forms ── */
.input, .select {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--border); font-size: 14px;
  font-family: inherit; background: #FAFAF7;
  outline: none; transition: border .2s;
}
.input:focus, .select:focus { border-color: var(--accent); }
textarea.input { resize: vertical; min-height: 56px; }
.label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-muted); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .5px;
}
.field { margin-bottom: 14px; }

/* ── Buttons ── */
.btn {
  padding: 10px 20px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; display: inline-flex;
  align-items: center; gap: 6px; transition: all .15s;
}
.btn:active { transform: scale(.96); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-white { background: #fff; color: var(--accent); }
.btn-small {
  padding: 6px 12px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.btn-small-accent { background: var(--accent-light); color: var(--accent); }
.btn-small-green { background: var(--green-light); color: var(--green); }
.btn-small-red { background: var(--red-light); color: var(--red); }
.btn-small-neutral { background: var(--border); color: var(--text); }

/* ── Tags ── */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 12px; border-radius: 8px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all .15s;
}
.tag.active { border-color: currentColor; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .2s;
}
.modal-content {
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  padding: 24px 20px calc(32px + env(safe-area-inset-bottom, 0px));
  animation: slideUp .3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* ── Section ── */
.section { padding: 16px 20px; }

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.stat-card { text-align: center; padding: 12px; cursor: pointer; }
.stat-number { font-size: 22px; font-weight: 700; margin-top: 4px; }
.stat-label { font-size: 11px; color: var(--text-muted); }

/* ── Greenhouse ── */
.gh-grid { display: grid; gap: 6px; }
.gh-cell {
  aspect-ratio: 1; border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500;
  cursor: pointer; padding: 2px; text-align: center;
  transition: all .15s; border: 1.5px solid var(--border);
  background: #F0EDE6; color: var(--text-muted);
}
.gh-cell.has-plant { background: var(--green-light); color: var(--green); }
.gh-cell.selected { border: 2.5px solid var(--accent); box-shadow: 0 0 0 3px rgba(232,130,12,.2); }
.gh-cell:active { transform: scale(.94); }

/* ── Toggle ── */
.toggle {
  width: 48px; height: 28px; border-radius: 14px;
  border: none; cursor: pointer; position: relative;
  background: var(--border); transition: background .3s;
}
.toggle.on { background: var(--accent); }
.toggle-knob {
  width: 22px; height: 22px; border-radius: 11px;
  background: #fff; position: absolute; top: 3px; left: 3px;
  transition: left .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle.on .toggle-knob { left: 23px; }

/* ── Empty State ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }

/* ── Install Banner ── */
.install-banner {
  background: linear-gradient(135deg, #2C2416, #4A3A28);
  color: #fff; border-radius: 16px; padding: 16px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
}
.install-banner-icon { font-size: 32px; }
.install-banner-text { flex: 1; }
.install-banner-title { font-weight: 700; font-size: 14px; }
.install-banner-sub { font-size: 12px; opacity: .75; margin-top: 2px; }

/* ── Notification Banner ── */
.notif-banner {
  background: var(--blue-light); border: 1.5px solid rgba(41,128,185,.2);
  border-radius: 16px; padding: 14px; margin-bottom: 12px;
}

/* ── Misc ── */
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-6 { gap: 6px; }
.gap-8 { gap: 8px; }
.gap-10 { gap: 10px; }
.gap-12 { gap: 12px; }
.wrap { flex-wrap: wrap; }
.grow { flex: 1; }
.center { text-align: center; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.w-full { width: 100%; }
.justify-center { justify-content: center; }
.items-center { align-items: center; }
.pointer { cursor: pointer; }
.row-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.row-item:last-child { border-bottom: none; }
.info-row {
  display: flex; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-muted); }
.info-value { font-weight: 600; }

.scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
</style>
</head>

<body>
<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// 🍋 MON JARDIN D'AGRUMES — PWA
// ══════════════════════════════════════════════════════════════════

// ─── Service Worker (inline) ─────────────────────────────────────
const SW_CODE = `
const CACHE = 'agrumes-v2';
const ASSETS = ['./', './index.html'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(
    ks.filter(k => k !== CACHE).map(k => caches.delete(k))
  )));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});

// Notification click
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window'}).then(cls => {
    if (cls.length) return cls[0].focus();
    return clients.openWindow('./');
  }));
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ─── Storage ─────────────────────────────────────────────────────
const STORE_KEY = 'citrus-garden-data';
function loadData() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    return d ? JSON.parse(d) : null;
  } catch { return null; }
}
function saveData(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch {}
}

const DEFAULT_DATA = {
  plants: [],
  careLogs: [],
  greenhouse: { width: 6, height: 4, positions: {} },
  settings: { wateringReminder: true, wateringInterval: 3, weatherAlerts: true, notifPermission: 'default' }
};

// ─── Helpers ─────────────────────────────────────────────────────
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}) : '—';
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const html = (el, h) => { el.innerHTML = h; };

const LOCATIONS = [
  { value:'serre', label:'🏠 Serre', color:'accent' },
  { value:'pot', label:'🪴 Pot (extérieur)', color:'blue' },
  { value:'pleine_terre', label:'🌱 Pleine terre', color:'green' },
];
const RUSTICITY = [
  { v:'-2', l:'-2°C (Très gélif)' },
  { v:'-5', l:'-5°C (Gélif)' },
  { v:'-8', l:'-8°C (Semi-rustique)' },
  { v:'-10', l:'-10°C (Rustique)' },
  { v:'-12', l:'-12°C (Très rustique)' },
  { v:'-15', l:'-15°C (Très rustique +)' },
];
const ENGRAIS = ['Engrais agrumes (NPK)','Engrais organique','Fer chélaté','Oligo-éléments','Compost','Autre'];
const TYPE_EMOJI = { watering:'💧', fertilizer:'🧪', fruit:'🍊', other:'📝' };
const TYPE_LABEL = { watering:'Arrosage', fertilizer:'Engrais', fruit:'Récolte', other:'Note' };

// ─── Notifications ───────────────────────────────────────────────
let notifGranted = false;

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  const perm = await Notification.requestPermission();
  notifGranted = perm === 'granted';
  return notifGranted;
}

function scheduleWateringCheck() {
  // Check every hour
  setInterval(() => {
    if (!notifGranted || !data.settings.wateringReminder) return;
    const now = new Date();
    // Only notify at 8am-9am
    if (now.getHours() !== 8) return;
    const needy = getPlantsNeedingWater();
    if (needy.length > 0) {
      new Notification('🍋 Arrosage !', {
        body: `${needy.length} plante${needy.length>1?'s ont':' a'} besoin d'eau : ${needy.slice(0,3).map(p=>p.name).join(', ')}`,
        icon: '🍋',
        tag: 'watering-reminder',
        renotify: true
      });
    }
  }, 60 * 60 * 1000); // every hour
  // Also check immediately on load
  checkInitialNotif();
}

function checkInitialNotif() {
  if (!notifGranted || !data.settings.wateringReminder) return;
  const needy = getPlantsNeedingWater();
  if (needy.length > 0) {
    setTimeout(() => {
      new Notification('🍋 Rappel arrosage', {
        body: `${needy.length} plante${needy.length>1?'s attendent':' attend'} un arrosage !`,
        tag: 'watering-initial'
      });
    }, 3000);
  }
}

function getPlantsNeedingWater() {
  const now = new Date();
  const interval = data.settings.wateringInterval || 3;
  return data.plants.filter(p => {
    const lastW = data.careLogs
      .filter(c => c.plantId === p.id && c.type === 'watering')
      .sort((a,b) => b.date.localeCompare(a.date))[0];
    if (!lastW) return true;
    const diff = (now - new Date(lastW.date+'T00:00:00')) / (1000*60*60*24);
    return diff >= interval;
  });
}

// ─── PWA Install ─────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  renderCurrentView();
});

async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === 'accepted') deferredPrompt = null;
  renderCurrentView();
}

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

// ─── State ───────────────────────────────────────────────────────
let data = loadData() || JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentView = 'home';
let selectedPlantId = null;
let modalType = null;
let editingPlant = null;
let ghSelected = null;
let ghAssignMode = false;
let careFilterType = 'all';
let plantFilter = 'all';
let plantSearch = '';

function save() { saveData(data); }

// ─── Render Engine ───────────────────────────────────────────────
const app = () => document.getElementById('app');

function navigate(view, plantId) {
  currentView = view;
  if (plantId) selectedPlantId = plantId;
  ghSelected = null;
  ghAssignMode = false;
  renderCurrentView();
  window.scrollTo(0, 0);
}

function openModal(type, plant) {
  modalType = type;
  editingPlant = plant || null;
  renderModal();
}

function closeModal() {
  modalType = null;
  editingPlant = null;
  const overlay = $('.modal-overlay');
  if (overlay) overlay.remove();
}

function renderCurrentView() {
  switch(currentView) {
    case 'home': renderHome(); break;
    case 'greenhouse': renderGreenhouse(); break;
    case 'plants': renderPlants(); break;
    case 'care': renderCare(); break;
    case 'settings': renderSettings(); break;
    case 'plant-detail': renderPlantDetail(); break;
  }
  if (currentView !== 'plant-detail') renderNav();
}

// ─── HOME ────────────────────────────────────────────────────────
function renderHome() {
  const needy = getPlantsNeedingWater();
  const recent = [...data.careLogs].sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);
  const serre = data.plants.filter(p=>p.location==='serre').length;
  const pot = data.plants.filter(p=>p.location==='pot').length;
  const terre = data.plants.filter(p=>p.location==='pleine_terre').length;

  let h = `
    <div class="header">
      <div style="font-size:28px;margin-bottom:4px">🍋</div>
      <h1>Mon Jardin d'Agrumes</h1>
      <div class="header-sub">${data.plants.length} plante${data.plants.length>1?'s':''} • ${data.careLogs.length} soin${data.careLogs.length>1?'s':''}</div>
    </div>
    <div class="section">
  `;

  // Install banner
  if (deferredPrompt && !isStandalone()) {
    h += `
      <div class="install-banner" onclick="installPWA()">
        <div class="install-banner-icon">📲</div>
        <div class="install-banner-text">
          <div class="install-banner-title">Installer l'appli</div>
          <div class="install-banner-sub">Ajouter sur l'écran d'accueil pour un accès rapide</div>
        </div>
        <div class="btn btn-white btn-small" style="white-space:nowrap">Installer</div>
      </div>
    `;
  }

  // Notification permission
  if ('Notification' in window && Notification.permission === 'default' && data.plants.length > 0) {
    h += `
      <div class="notif-banner">
        <div class="flex items-center gap-8 mb-8">
          <span style="font-size:20px">🔔</span>
          <strong style="color:var(--blue)">Activer les rappels</strong>
        </div>
        <div style="font-size:13px;margin-bottom:10px">Reçois une notification quand tes plantes ont besoin d'eau !</div>
        <button class="btn btn-primary btn-small" onclick="requestNotifPermission().then(()=>renderCurrentView())">Activer les notifications</button>
      </div>
    `;
  }

  // Stats
  h += `
    <div class="stats-grid mb-16">
      <div class="card stat-card card-tap" onclick="navigate('greenhouse')">
        <div style="color:var(--accent)">🏠</div>
        <div class="stat-number" style="color:var(--accent)">${serre}</div>
        <div class="stat-label">En serre</div>
      </div>
      <div class="card stat-card card-tap" onclick="plantFilter='pot';navigate('plants')">
        <div style="color:var(--blue)">🪴</div>
        <div class="stat-number" style="color:var(--blue)">${pot}</div>
        <div class="stat-label">En pot</div>
      </div>
      <div class="card stat-card card-tap" onclick="plantFilter='pleine_terre';navigate('plants')">
        <div style="color:var(--green)">🌱</div>
        <div class="stat-number" style="color:var(--green)">${terre}</div>
        <div class="stat-label">Pleine terre</div>
      </div>
    </div>
  `;

  // Watering alert
  if (needy.length > 0) {
    h += `
      <div class="card" style="background:var(--blue-light);border:1.5px solid rgba(41,128,185,.2)">
        <div class="flex items-center gap-8 mb-8">
          <span style="font-size:20px">💧</span>
          <strong style="color:var(--blue)">Arrosage à prévoir</strong>
        </div>
        <div style="font-size:13px;margin-bottom:10px">${needy.length} plante${needy.length>1?'s ont':' a'} besoin d'eau !</div>
        <div class="flex wrap gap-6">
          ${needy.slice(0,6).map(p => `<button class="btn-small btn-small-accent" onclick="quickWater('${p.id}')">${p.name} ✓</button>`).join('')}
        </div>
      </div>
    `;
  }

  // Recent
  if (recent.length > 0) {
    h += `
      <div class="flex-between mt-12 mb-8">
        <h3 style="font-size:16px">Activité récente</h3>
        <button class="btn-small btn-small-accent" onclick="navigate('care')">Tout voir</button>
      </div>
    `;
    recent.forEach(log => {
      const pl = data.plants.find(p => p.id === log.plantId);
      h += `
        <div class="row-item">

// ─── GREENHOUSE ──────────────────────────────────────────────────
function renderGreenhouse() {
  const gh = data.greenhouse;
  const serrePlants = data.plants.filter(p=>p.location==='serre');
  const assignedIds = Object.values(gh.positions);

  let h = `
    <div class="header">
      <h1>🏠 Ma Serre</h1>
      <div class="header-sub">Touche une case pour placer ou voir une plante</div>
    </div>
    <div class="section">
      <div class="flex items-center justify-center gap-8 mb-16" style="flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-muted)">Taille :</span>
        <button class="btn-small btn-small-accent" onclick="resizeGH(${gh.width-1},${gh.height})">−Col</button>
        <span style="font-size:13px;font-weight:600">${gh.width} × ${gh.height}</span>
        <button class="btn-small btn-small-accent" onclick="resizeGH(${gh.width+1},${gh.height})">+Col</button>
        <button class="btn-small btn-small-accent" onclick="resizeGH(${gh.width},${gh.height-1})">−Rang</button>
        <button class="btn-small btn-small-accent" onclick="resizeGH(${gh.width},${gh.height+1})">+Rang</button>
      </div>
      <div class="card" style="padding:12px;overflow-x:auto">
        <div class="gh-grid" style="grid-template-columns:repeat(${gh.width},1fr);min-width:${gh.width*60}px">
  `;

  for (let r = 0; r < gh.height; r++) {
    for (let c = 0; c < gh.width; c++) {
      const key = `${r}-${c}`;
      const pid = gh.positions[key];
      const plant = data.plants.find(p => p.id === pid);
      const cls = `gh-cell${plant?' has-plant':''}${ghSelected===key?' selected':''}`;
      h += `<div class="${cls}" onclick="ghCellClick('${key}')">`;
      if (plant) {
        h += `<span style="font-size:18px">🍊</span><span style="line-height:1.1;margin-top:2px">${plant.name}</span>`;
      } else {
        h += `<span style="font-size:16px;opacity:.3">+</span>`;
      }
      h += `</div>`;
    }
  }

  h += `</div></div>`;

  if (ghAssignMode && ghSelected) {
    h += `
      <div class="card mt-12" style="border:2px solid var(--accent)">
        <div style="font-weight:600;margin-bottom:8px">Placer une plante ici :</div>
    `;
    if (gh.positions[ghSelected]) {
      h += `<button class="btn-small btn-small-red mb-8" onclick="ghRemove('${ghSelected}')">Retirer la plante</button>`;
    }
    const available = serrePlants.filter(p => !assignedIds.includes(p.id) || gh.positions[ghSelected] === p.id);
    if (available.length > 0) {
      h += `<div class="flex wrap gap-6">`;
      available.forEach(p => {
        h += `<button class="btn-small btn-small-green" onclick="ghAssign('${ghSelected}','${p.id}')">🍊 ${p.name}</button>`;
      });
      h += `</div>`;
    } else {
      h += `<div style="font-size:12px;color:var(--text-muted)">Toutes les plantes « serre » sont déjà placées</div>`;
    }
    h += `<button class="btn-small btn-small-neutral mt-8" onclick="ghCancel()">Annuler</button></div>`;
  }

  h += `</div>`;
  html(app(), h);
}

function resizeGH(w, h) {
  data.greenhouse.width = Math.max(2, Math.min(10, w));
  data.greenhouse.height = Math.max(2, Math.min(10, h));
  save(); renderGreenhouse(); renderNav();
}
function ghCellClick(key) {
  if (ghAssignMode) { ghSelected = key; renderGreenhouse(); renderNav(); return; }
  if (data.greenhouse.positions[key]) {
    navigate('plant-detail', data.greenhouse.positions[key]);
  } else {
    ghSelected = key; ghAssignMode = true;
    renderGreenhouse(); renderNav();
  }
}
function ghAssign(key, plantId) {
  const pos = data.greenhouse.positions;
  Object.keys(pos).forEach(k => { if(pos[k]===plantId) delete pos[k]; });
  pos[key] = plantId;
  ghAssignMode = false; ghSelected = null;
  save(); renderGreenhouse(); renderNav();
}
function ghRemove(key) {
  delete data.greenhouse.positions[key];
  ghAssignMode = false; ghSelected = null;
  save(); renderGreenhouse(); renderNav();
}
function ghCancel() { ghAssignMode = false; ghSelected = null; renderGreenhouse(); renderNav(); }

          <select class="select" id="c-plant">
            <option value="">Choisir...</option>
            ${data.plants.map(p=>`<option value="${p.id}" ${p.id===preselect?'selected':''}>${p.name}${p.variety?' ('+p.variety+')':''}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label class="label">Type de soin</label>
          <div class="flex wrap gap-8" id="c-type-btns">
            <button class="tag active" data-type="watering" style="background:var(--blue-light);color:var(--blue)" onclick="setCareType('watering')">💧 Arrosage</button>
            <button class="tag" data-type="fertilizer" onclick="setCareType('fertilizer')">🧪 Engrais</button>
            <button class="tag" data-type="fruit" onclick="setCareType('fruit')">🍊 Fructification</button>
            <button class="tag" data-type="other" onclick="setCareType('other')">📝 Autre</button>
          </div>
        </div>
        <div class="field"><label class="label">Date</label><input type="date" class="input" id="c-date" value="${today()}"></div>
        <div id="c-extra"></div>
        <div class="field"><label class="label">Notes</label><textarea class="input" id="c-notes" placeholder="Remarques..."></textarea></div>
        <button class="btn btn-primary w-full justify-center mt-8" onclick="saveCareForm()">Enregistrer ✓</button>
      </div>
    `;
  }

  document.body.appendChild(overlay);
  if (modalType === 'add-care' || modalType === 'add-care-plant') {
    setCareType('watering');
  }
}

// Care type switching
let currentCareType = 'watering';
function setCareType(type) {
  currentCareType = type;
  const btns = document.querySelectorAll('#c-type-btns .tag');
  const colors = { watering: ['var(--blue-light)','var(--blue)'], fertilizer: ['var(--green-light)','var(--green)'], fruit: ['var(--accent-light)','var(--accent)'], other: ['#F0EDE6','var(--text-muted)'] };
  btns.forEach(b => {
    const t = b.dataset.type;
    if (t === type) {
      b.classList.add('active');
      b.style.background = colors[t][0];
      b.style.color = colors[t][1];
      b.style.borderColor = colors[t][1] + '40';
    } else {
      b.classList.remove('active');
      b.style.background = '#F5F3EF';
      b.style.color = 'var(--text-muted)';
      b.style.borderColor = 'transparent';
    }
  });
  const extra = document.getElementById('c-extra');
  if (type === 'fertilizer') {
    extra.innerHTML = `
      <div class="field"><label class="label">Type d'engrais</label>
        <select class="select" id="c-fert-type"><option value="">Choisir...</option>${ENGRAIS.map(e=>`<option>${e}</option>`).join('')}</select>
      </div>
      <div class="field"><label class="label">Quantité</label><input class="input" id="c-fert-amount" placeholder="Ex: 5g/L, 1 poignée..."></div>
    `;
  } else if (type === 'fruit') {
    extra.innerHTML = `<div class="field"><label class="label">Nombre de fruits</label><input type="number" class="input" id="c-fruit-count"></div>`;
  } else {
    extra.innerHTML = '';
  }
}

// ─── SAVE HANDLERS ───────────────────────────────────────────────
function savePlantForm(id, isEdit) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Donne un nom à ta plante !'); return; }
  const plant = {
    id, name,
    variety: document.getElementById('f-variety').value.trim(),
    location: document.getElementById('f-location').value,
    purchaseDate: document.getElementById('f-date').value,
    rusticity: document.getElementById('f-rust').value,
    nursery: document.getElementById('f-nursery').value.trim(),
    rootstock: document.getElementById('f-rootstock').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };
  if (isEdit) {
    const idx = data.plants.findIndex(p => p.id === id);
    if (idx >= 0) data.plants[idx] = plant;
  } else {
    data.plants.push(plant);
  }
  save(); closeModal(); renderCurrentView();
}

function saveCareForm() {
  const plantId = document.getElementById('c-plant').value;
  if (!plantId) { alert('Choisis une plante !'); return; }
  const log = {
    id: genId(), plantId, type: currentCareType,
    date: document.getElementById('c-date').value,
    fertilizerType: document.getElementById('c-fert-type')?.value || '',
    fertilizerAmount: document.getElementById('c-fert-amount')?.value || '',
    fruitCount: document.getElementById('c-fruit-count')?.value || '',
    notes: document.getElementById('c-notes').value.trim(),
  };
  data.careLogs.push(log);
  save(); closeModal(); renderCurrentView();
}

function quickWater(plantId) {
  data.careLogs.push({ id: genId(), plantId, type:'watering', date: today(), notes:'Arrosage rapide', fertilizerType:'', fertilizerAmount:'', fruitCount:'' });
  save(); renderCurrentView();
}

function deletePlant(id) {
  if (!confirm('Supprimer cette plante et tous ses soins ?')) return;
  data.plants = data.plants.filter(p => p.id !== id);
  data.careLogs = data.careLogs.filter(l => l.plantId !== id);
  const pos = data.greenhouse.positions;
  Object.keys(pos).forEach(k => { if (pos[k] === id) delete pos[k]; });
  save(); navigate('plants');
}

function deleteCareLog(id) {
  if (!confirm('Supprimer ce soin ?')) return;
  data.careLogs = data.careLogs.filter(l => l.id !== id);
  save(); renderPlantDetail();
}

function resetAll() {
  if (!confirm('Tout effacer ? Cette action est irréversible !')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  save(); navigate('home');
}

// ─── Splash & Init ───────────────────────────────────────────────
function init() {
  // Splash screen
  const splash = document.createElement('div');
  splash.className = 'splash';
  splash.innerHTML = `<div class="splash-icon">🍋</div><div class="splash-title">Mes Agrumes</div><div class="splash-sub">Chargement...</div>`;
  document.body.appendChild(splash);

  // Check notification permission
  if ('Notification' in window && Notification.permission === 'granted') {
    notifGranted = true;
  }

  setTimeout(() => {
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 600);
    renderCurrentView();
    scheduleWateringCheck();
  }, 1200);
}

init();
</script>
