<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mes Agrumes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F3ED;--card:#fff;--accent:#E8820C;--accent-l:#FFF3E0;--green:#4A7C59;--green-l:#E8F0EA;--red:#C0392B;--red-l:#FDEAEA;--blue:#2980B9;--blue-l:#E8F4FD;--txt:#2C2416;--muted:#8B7D6B;--brd:#E8E0D4}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:72px}
.hdr{background:linear-gradient(135deg,#E8820C,#C96A08);color:#fff;padding:20px 20px 16px;padding-top:max(20px,env(safe-area-inset-top));border-radius:0 0 24px 24px}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.hdr-sub{font-size:13px;opacity:.85;margin-top:2px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;justify-content:space-around;padding:6px 0 max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);z-index:100}
.nav-b{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:4px 12px;cursor:pointer;font-size:11px;font-family:inherit;color:var(--muted);transition:color .2s}
.nav-b.on{color:var(--accent);font-weight:600}
.cd{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(44,36,22,.07);border:1px solid var(--brd);transition:transform .15s}
.bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bdg-a{color:var(--accent);background:var(--accent-l)}.bdg-g{color:var(--green);background:var(--green-l)}.bdg-b{color:var(--blue);background:var(--blue-l)}.bdg-r{color:var(--red);background:var(--red-l)}
.inp,.sel{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--brd);font-size:14px;font-family:inherit;background:#FAFAF7;outline:none;transition:border .2s}
.inp:focus,.sel:focus{border-color:var(--accent)}
textarea.inp{resize:vertical;min-height:56px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fld{margin-bottom:14px}
.btn{padding:10px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--accent);color:#fff}.btn-s{background:var(--brd);color:var(--txt)}.btn-w{background:#fff;color:var(--accent)}
.btn-google{background:#fff;color:#333;border:1.5px solid var(--brd);padding:12px 24px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:10px;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google:active{transform:scale(.97)}
.bs{padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s}
.bs:active{transform:scale(.95)}
.bs-a{background:var(--accent-l);color:var(--accent)}.bs-g{background:var(--green-l);color:var(--green)}.bs-r{background:var(--red-l);color:var(--red)}.bs-n{background:var(--brd);color:var(--txt)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.tag.on{border-color:currentColor}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.mc{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:24px 20px calc(32px + env(safe-area-inset-bottom,0px));animation:su .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sec{padding:16px 20px}
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sc{text-align:center;padding:12px;cursor:pointer}
.sn{font-size:22px;font-weight:700;margin-top:4px}
.sl{font-size:11px;color:var(--muted)}
.gg{display:grid;gap:6px}
.gc{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;padding:2px;text-align:center;transition:all .15s;border:1.5px solid var(--brd);background:#F0EDE6;color:var(--muted)}
.gc.hp{background:var(--green-l);color:var(--green)}.gc.sel{border:2.5px solid var(--accent);box-shadow:0 0 0 3px rgba(232,130,12,.2)}
.gc:active{transform:scale(.94)}
.tgl{width:48px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;background:var(--brd);transition:background .3s}
.tgl.on{background:var(--accent)}
.tgl-k{width:22px;height:22px;border-radius:11px;background:#fff;position:absolute;top:3px;left:3px;transition:left .3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .tgl-k{left:23px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.g1{flex:1}
.w100{width:100%}.jc{justify-content:center}
.ri{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.ri:last-child{border-bottom:none}
.ir{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:13px}
.ir:last-child{border-bottom:none}
.splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(145deg,#E8820C,#D4740A);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s,transform .6s}
.splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-i{font-size:72px;animation:bn 1.2s ease infinite}
@keyframes bn{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 20px;text-align:center}
.login-logo{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:700;color:var(--txt);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px;max-width:300px;line-height:1.5}
.sync-bar{background:var(--accent-l);padding:6px 16px;font-size:11px;color:var(--accent);text-align:center;font-weight:600;border-radius:0 0 12px 12px}
.user-bar{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:rgba(255,255,255,.15);border-radius:10px;font-size:12px}
.user-bar img{width:24px;height:24px;border-radius:50%}
</style>
</head>

<script>
(function(){
"use strict";

// ── Firebase Config ──
firebase.initializeApp({
  apiKey:"AIzaSyBkVTjlsdZvQ-vEYda4fO-4X-Ni6O1sFR4",
  authDomain:"mes-agrumes.firebaseapp.com",
  databaseURL:"https://mes-agrumes-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mes-agrumes",
  storageBucket:"mes-agrumes.firebasestorage.app",
  messagingSenderId:"531593370997",
  appId:"1:531593370997:web:165aec418c2fda339ec73c",
  measurementId:"G-M3KVMZEL29"
});

var auth=firebase.auth();
var db=firebase.firestore();

// Enable offline cache so data persists between page reloads
db.enablePersistence({synchronizeTabs:true}).catch(function(e){
  console.log('Persistence error:',e.code);
});

// Keep auth session between reloads
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

var provider=new firebase.auth.GoogleAuthProvider();
var currentUser=null;
var unsub=null; // Firestore listener

// ── Data ──
var DD={plants:[],careLogs:[],greenhouse:{width:6,height:4,positions:{}},settings:{wateringReminder:true,wateringInterval:3,weatherAlerts:true,weatherLat:48.86,weatherLon:2.35,weatherCity:'Paris'}};
var D=JSON.parse(JSON.stringify(DD));
var weatherData=null;
var weatherLoading=false;
var saveTimer=null;

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function td(){return new Date().toISOString().split('T')[0]}
function fd(d){return d?new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):'\u2014'}

var LOCS=[{v:'serre',l:'\ud83c\udfe0 Serre',c:'a'},{v:'pot',l:'\ud83e\udeb4 Pot (ext.)',c:'b'},{v:'pleine_terre',l:'\ud83c\udf31 Pleine terre',c:'g'}];
var RUST=[];for(var ri=-2;ri>=-15;ri--)RUST.push({v:''+ri,l:ri+'\u00b0C'});
var MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
var USAGES=['Fruit de bouche','Cuisine','Jus','Zestes','Confiture / Marmelade','D\u00e9coration / Parfum','Autre'];
var FERTS=['Engrais agrumes (NPK)','Engrais organique','Fer ch\u00e9lat\u00e9','Oligo-\u00e9l\u00e9ments','Compost','Autre'];
var TE={watering:'\ud83d\udca7',fertilizer:'\ud83e\uddea',fruit:'\ud83c\udf4a',other:'\ud83d\udcdd'};
var TL={watering:'Arrosage',fertilizer:'Engrais',fruit:'R\u00e9colte',other:'Note'};
function locI(v){for(var i=0;i<LOCS.length;i++)if(LOCS[i].v===v)return LOCS[i];return LOCS[0]}
function bc(c){return c==='a'?'bdg-a':c==='b'?'bdg-b':'bdg-g'}

function nw(){
  var now=new Date(),iv=D.settings.wateringInterval||3;
  return D.plants.filter(function(p){
    var l=D.careLogs.filter(function(c){return c.plantId===p.id&&c.type==='watering'}).sort(function(a,b){return b.date.localeCompare(a.date)});
    return !l.length||(now-new Date(l[0].date+'T00:00:00'))/(864e5)>=iv;
  });
}

// ── Weather / Frost Alerts ──
function fetchWeather(){
  if(weatherLoading||!D.settings.weatherAlerts)return;
  var lat=D.settings.weatherLat||48.86,lon=D.settings.weatherLon||2.35;
  weatherLoading=true;
  var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&daily=temperature_2m_min,temperature_2m_max&timezone=auto&forecast_days=5';
  fetch(url).then(function(r){return r.json()}).then(function(data){
    weatherLoading=false;
    if(data&&data.daily){
      weatherData={
        dates:data.daily.time,
        mins:data.daily.temperature_2m_min,
        maxs:data.daily.temperature_2m_max
      };
      R();
    }
  }).catch(function(){weatherLoading=false;});
}

function getFrostAlerts(){
  if(!weatherData||!D.settings.weatherAlerts||!D.plants.length)return[];
  var alerts=[];
  weatherData.dates.forEach(function(date,i){
    var minTemp=weatherData.mins[i];
    var endangered=D.plants.filter(function(p){
      var rust=parseInt(p.rusticity)||0;
      return minTemp<=rust+2; // alerte si la temp s'approche à 2° de la rusticité
    });
    if(endangered.length>0){
      var d=new Date(date+'T00:00:00');
      var dayName=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
      alerts.push({date:dayName,minTemp:minTemp,maxTemp:weatherData.maxs[i],plants:endangered});
    }
  });
  return alerts;
}

function rFrostBanner(){
  var alerts=getFrostAlerts();
  if(!alerts.length)return '';
  var h='<div class="cd" style="background:var(--red-l);border:2px solid var(--red)">';
  h+='<div class="fc" style="gap:8px;margin-bottom:8px"><span style="font-size:22px">\u{1F976}</span><strong style="color:var(--red)">Alerte gel !</strong></div>';
  alerts.forEach(function(a){
    h+='<div style="margin-bottom:10px;padding:8px;background:rgba(255,255,255,.5);border-radius:10px">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:4px">'+esc(a.date)+' : '+a.minTemp+'\u00b0C min / '+a.maxTemp+'\u00b0C max</div>';
    h+='<div style="font-size:12px;color:var(--txt)">Plantes en danger :</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">';
    a.plants.forEach(function(p){
      h+='<span class="bdg bdg-r">'+(p.photo?'':'🍊 ')+esc(p.name)+' ('+p.rusticity+'\u00b0C)</span>';
    });
    h+='</div></div>';
  });
  h+='<div style="font-size:11px;color:var(--muted);margin-top:4px">Pr\u00e9visions pour '+(D.settings.weatherCity||'Paris')+' \u2022 Alerte si temp. approche \u00e0 2\u00b0C de la rusticit\u00e9</div>';
  h+='</div>';
  return h;
}

function rWeatherSummary(){
  if(!weatherData)return '';
  var h='<div class="cd" style="padding:12px"><div class="fc" style="gap:6px;margin-bottom:8px"><span style="font-size:16px">\u{1F321}\ufe0f</span><strong style="font-size:13px">M\u00e9t\u00e9o '+(D.settings.weatherCity||'Paris')+'</strong></div>';
  h+='<div style="display:flex;gap:6px;overflow-x:auto">';
  weatherData.dates.forEach(function(date,i){
    var d=new Date(date+'T00:00:00');
    var day=d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'});
    var min=weatherData.mins[i],max=weatherData.maxs[i];
    var cold=min<=0;
    h+='<div style="text-align:center;padding:6px 8px;border-radius:8px;min-width:60px;background:'+(cold?'var(--red-l)':'#F5F3EF')+'"><div style="font-size:11px;color:var(--muted)">'+day+'</div>';
    h+='<div style="font-size:18px;margin:2px 0">'+(cold?'\u{2744}\ufe0f':min<5?'\u{1F327}\ufe0f':'\u{2600}\ufe0f')+'</div>';
    h+='<div style="font-size:12px;font-weight:700;color:'+(cold?'var(--red)':'var(--txt)')+'">'+Math.round(min)+'\u00b0</div>';
    h+='<div style="font-size:11px;color:var(--muted)">'+Math.round(max)+'\u00b0</div></div>';
  });
  h+='</div></div>';
  return h;
}

// ── Fertilization Advice ──
function getFertAdvice(plant){
  var m=new Date().getMonth(); // 0=jan
  var inPot=plant.location==='pot'||plant.location==='serre';
  var advice={icon:'',title:'',text:'',actions:[]};

  if(m>=2&&m<=4){ // Mars-Mai : Reprise + Floraison
    advice.icon='\ud83c\udf31';
    advice.title='Reprise de v\u00e9g\u00e9tation';
    if(m===2){
      advice.text='C\'est le moment de relancer la fertilisation ! Apporte un engrais organique riche en azote (NPK 5-6-9 ou similaire) pour stimuler la croissance et pr\u00e9parer la floraison.';
      advice.actions=['Engrais organique complet','Fer ch\u00e9lat\u00e9 si feuilles jaunes'];
    } else if(m===3){
      advice.text='Pleine p\u00e9riode de floraison. Continue la fertilisation mensuelle. Le potassium est important pour la nouaison (formation des fruits).';
      advice.actions=['Engrais organique complet','Oligo-\u00e9l\u00e9ments en foliaire'];
    } else {
      advice.text='Fin de floraison et d\u00e9but de nouaison. Fertilise r\u00e9guli\u00e8rement pour assurer la fixation des jeunes fruits sur l\'arbre.';
      advice.actions=['Engrais organique complet'];
    }
    if(inPot)advice.text+='\n\ud83e\udeb4 En pot : environ 5-6g par litre de terreau.';
    else advice.text+='\n\ud83c\udf31 En pleine terre : 600 \u00e0 900g selon la taille de l\'arbre.';
  } else if(m>=5&&m<=7){ // Juin-Ao\u00fbt : Grossissement fruits
    advice.icon='\ud83c\udf4a';
    advice.title='Grossissement des fruits';
    advice.text='Les fruits grossissent, les besoins en potassium augmentent. Continue la fertilisation mensuelle avec un engrais \u00e9quilibr\u00e9.';
    if(m===7)advice.text+=' En ao\u00fbt, fais un dernier apport pour pr\u00e9parer la mise en r\u00e9serve avant l\'automne.';
    advice.actions=['Engrais organique complet','Potassium si beaucoup de fruits'];
    if(inPot)advice.text+='\n\ud83e\udeb4 En pot : fertilise chaque mois, arrose bien apr\u00e8s l\'apport.';
    else advice.text+='\n\ud83c\udf31 En pleine terre : un apport tous les 2-3 mois suffit.';
  } else if(m>=8&&m<=9){ // Sept-Oct : Fin de saison
    advice.icon='\ud83c\udf42';
    advice.title='Fin de saison';
    advice.text='Dernier apport d\'engrais de la saison (septembre). La plante fait ses r\u00e9serves avant le repos hivernal. Privil\u00e9gie le potassium pour renforcer la r\u00e9sistance au froid.';
    advice.actions=['Dernier apport d\'engrais organique','Potasse pour la r\u00e9sistance au froid'];
    if(m===9)advice.text='\n\u26a0\ufe0f Arr\u00eate la fertilisation en octobre. La plante entre en repos.';
  } else { // Nov-F\u00e9v : Repos
    advice.icon='\u2744\ufe0f';
    advice.title='Repos hivernal';
    advice.text='Pas de fertilisation en hiver ! La plante est au repos. Les racines n\'absorbent quasiment rien quand il fait froid (en dessous de 10\u00b0C).';
    advice.actions=[];
    if(m===1)advice.text+=' \ud83d\udcc5 Pr\u00e9pare ton engrais, la reprise approche en mars !';
  }

  return advice;
}

function rFertSection(){
  if(!D.plants.length)return '';
  var m=new Date().getMonth();
  var monthName=MONTHS[m];
  var h='<div style="margin-top:12px"><div class="fb" style="margin-bottom:8px"><h3 style="font-size:16px">\ud83e\uddea Conseils fertilisation</h3><span class="bdg bdg-g">'+monthName+'</span></div>';

  // Group by similar advice (pot vs pleine terre)
  var potPlants=D.plants.filter(function(p){return p.location==='pot'||p.location==='serre'});
  var terrePlants=D.plants.filter(function(p){return p.location==='pleine_terre'});

  if(potPlants.length){
    var adv=getFertAdvice(potPlants[0]);
    h+='<div class="cd" style="padding:14px"><div class="fc" style="gap:8px;margin-bottom:6px"><span style="font-size:18px">'+adv.icon+'</span><strong style="font-size:14px">'+adv.title+' \u2014 Pots & Serre</strong></div>';
    h+='<div style="font-size:13px;color:var(--txt);line-height:1.5;white-space:pre-line">'+esc(adv.text)+'</div>';
    if(adv.actions.length){
      h+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
      adv.actions.forEach(function(a){h+='<span class="bdg bdg-g">\u2713 '+esc(a)+'</span>'});
      h+='</div>';
    }
    h+='<div style="margin-top:8px;font-size:11px;color:var(--muted)">Concerne : '+potPlants.map(function(p){return esc(p.name)}).join(', ')+'</div>';
    h+='</div>';
  }

  if(terrePlants.length){
    var adv2=getFertAdvice(terrePlants[0]);
    h+='<div class="cd" style="padding:14px"><div class="fc" style="gap:8px;margin-bottom:6px"><span style="font-size:18px">'+adv2.icon+'</span><strong style="font-size:14px">'+adv2.title+' \u2014 Pleine terre</strong></div>';
    h+='<div style="font-size:13px;color:var(--txt);line-height:1.5;white-space:pre-line">'+esc(adv2.text)+'</div>';
    if(adv2.actions.length){
      h+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
      adv2.actions.forEach(function(a){h+='<span class="bdg bdg-g">\u2713 '+esc(a)+'</span>'});
      h+='</div>';
    }
    h+='<div style="margin-top:8px;font-size:11px;color:var(--muted)">Concerne : '+terrePlants.map(function(p){return esc(p.name)}).join(', ')+'</div>';
    h+='</div>';
  }

  h+='<div style="font-size:11px;color:var(--muted);margin-top:4px;margin-bottom:12px">\ud83d\udca1 Privil\u00e9gie les engrais organiques (NPK 5-6-9 environ). Dose indicative en pot : 5-6g/L de terreau par mois de mars \u00e0 octobre.</div>';
  h+='</div>';
  return h;
}

function saveToFirebase(){
  if(!currentUser)return;
  // Debounce saves to avoid conflicts
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    db.collection('users').doc(currentUser.uid).set({
      plants:D.plants,
      careLogs:D.careLogs,
      greenhouse:D.greenhouse,
      settings:D.settings,
      wishlist:D.wishlist||[],
      wishlistInited:D.wishlistInited||false,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){console.error('Save error:',e)});
  },300);
}

var dataLoaded=false;
function listenToFirebase(){
  if(unsub)unsub();
  if(!currentUser)return;
  unsub=db.collection('users').doc(currentUser.uid).onSnapshot(function(doc){
    if(doc.exists){
      var d=doc.data();
      D.plants=d.plants||[];
      D.careLogs=d.careLogs||[];
      D.greenhouse=d.greenhouse||DD.greenhouse;
      D.settings=d.settings||DD.settings;
      D.wishlist=d.wishlist||[];
      D.wishlistInited=d.wishlistInited||false;
    }
    dataLoaded=true;
    R();
    if(!weatherData&&D.settings.weatherAlerts)fetchWeather();
  },function(err){
    console.error('Firestore listen error:',err);
    dataLoaded=true;
    R();
  });
}

function persist(){
  saveToFirebase();
}

// ── Auth ──
auth.onAuthStateChanged(function(user){
  hideSplash();
  if(user){
    currentUser=user;
    dataLoaded=false;
    listenToFirebase();
    // Don't render yet - wait for onSnapshot to deliver data
  } else {
    currentUser=null;
    if(unsub){unsub();unsub=null;}
    D=JSON.parse(JSON.stringify(DD));
    dataLoaded=false;
    showLogin();
  }
});

  auth.signInWithPopup(provider).catch(function(e){
    // Fallback to redirect for mobile

      auth.signInWithRedirect(provider);
    } else {
      alert('Erreur de connexion: '+e.message);

  });
}

var diagStep=0,diagAnswers={},diagResult=null;

function diagReset(){diagStep=0;diagAnswers={};diagResult=null;}

function diagCalculate(){
  var scores={};
  CARENCES.forEach(function(c){
    var score=0,total=0;
    Object.keys(c.match).forEach(function(k){
      total++;
      if(diagAnswers[k]===c.match[k])score+=3;
      else if(k==='zone'&&diagAnswers[k]==='toutes')score+=1;
    });
    scores[c.id]={carence:c,score:score,pct:Math.round(score/(total*3)*100)};
  });
  var sorted=Object.values(scores).sort(function(a,b){return b.score-a.score});
  diagResult={best:sorted[0],others:sorted.slice(1,3).filter(function(s){return s.pct>=25})};
}

// ── RAPPEL REMPOTAGE ──
function getRepotAlerts(){
  var now=new Date(),alerts=[];
  D.plants.forEach(function(p){
    if(p.location==='pleine_terre')return; // pas de rempotage en pleine terre
    if(!p.purchaseDate)return;
    var purchase=new Date(p.purchaseDate+'T00:00:00');
    var years=(now-purchase)/(365.25*864e5);
    var lastRepot=null;
    // Chercher le dernier rempotage dans les soins
    D.careLogs.forEach(function(l){
      if(l.plantId===p.id&&l.notes&&l.notes.toLowerCase().indexOf('rempot')>=0){
        if(!lastRepot||l.date>lastRepot)lastRepot=l.date;
      }
    });
    var ref=lastRepot?new Date(lastRepot+'T00:00:00'):purchase;
    var sinceLast=(now-ref)/(365.25*864e5);
    var status='ok',label='',color='';
    if(sinceLast>=3){status='urgent';label='Rempotage urgent (\u00e0 faire !)';color='var(--red)';}
    else if(sinceLast>=2){status='soon';label='Rempotage \u00e0 pr\u00e9voir';color='var(--accent)';}
    else if(sinceLast>=1.5){status='ok_soon';label='Rempotage dans ~6 mois';color='var(--green)';}
    else{status='ok';label='';color='';}
    if(status!=='ok')alerts.push({plant:p,status:status,label:label,color:color,years:Math.round(sinceLast*10)/10});
  });
  alerts.sort(function(a,b){var o={urgent:0,soon:1,ok_soon:2};return (o[a.status]||0)-(o[b.status]||0)});
  return alerts;
}

function rRepotBanner(){
  var alerts=getRepotAlerts().filter(function(a){return a.status==='urgent'||a.status==='soon'});
  if(!alerts.length)return '';
  var h='<div class="cd" style="background:var(--accent-l);border:1.5px solid rgba(232,130,12,.25)">';
  h+='<div class="fc" style="gap:8px;margin-bottom:8px"><span style="font-size:20px">\ud83e\udeb4</span><strong style="color:var(--accent)">Rempotage \u00e0 pr\u00e9voir</strong></div>';
  alerts.forEach(function(a){

var TASK_COLORS={engrais:{bg:'var(--green-l)',color:'var(--green)',icon:'\ud83e\uddea'},
                 taille:{bg:'var(--blue-l)',color:'var(--blue)',icon:'\u2702\ufe0f'},

function getTasksForMonth(m){
  if(!D.plants.length)return[];
  var tasks=[];
  TASKS_DB.forEach(function(t){
    if(t.months.indexOf(m)<0)return;
    var concerned=D.plants.filter(function(p){return t.locs.indexOf(p.location)>=0});
    if(!concerned.length)return;

    // Séparer pleine terre vs pot/serre (les conseils pot/serre sont souvent les mêmes)
    var potSerre=concerned.filter(function(p){return p.location==='pot'||p.location==='serre'});
    var terre=concerned.filter(function(p){return p.location==='pleine_terre'});

    if(potSerre.length&&(t.locs.indexOf('pot')>=0||t.locs.indexOf('serre')>=0)){
      var desc=t.desc.pot||t.desc.serre||t.desc[Object.keys(t.desc)[0]];
      tasks.push({type:t.type,emoji:t.emoji,title:t.title,desc:desc,priority:t.priority,
        plants:potSerre,location:'pot_serre'});
    }
    if(terre.length&&t.locs.indexOf('pleine_terre')>=0){
      var desc2=t.desc.pleine_terre||t.desc[Object.keys(t.desc)[0]];
      tasks.push({type:t.type,emoji:t.emoji,title:t.title,desc:desc2,priority:t.priority,
        plants:terre,location:'pleine_terre'});
    }
  });

  var prio={haute:0,moyenne:1,faible:2};
  tasks.sort(function(a,b){return (prio[a.priority]||1)-(prio[b.priority]||1)});
  return tasks;
}

function compressPhoto(file,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement('canvas'),max=300;
      var w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.6));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function fmtHarvest(p){
  if(p.harvestStart===''&&p.harvestEnd==='')return '';

  var e=p.harvestEnd!==''?MONTHS[parseInt(p.harvestEnd)]:'?';
  return s+' \u2192 '+e;
}

  var selloc=t.closest('[data-selloc]');
  if(selloc){selectPlantsByFilter(selloc.getAttribute('data-selloc'));return;}

  var ct=t.closest('[data-ct]');
  if(ct){CT=ct.getAttribute('data-ct');
    var cols={watering:['var(--blue-l)','var(--blue)'],fertilizer:['var(--green-l)','var(--green)'],fruit:['var(--accent-l)','var(--accent)'],other:['#F0EDE6','var(--muted)']};
    document.querySelectorAll('#ctb .tag').forEach(function(b){
      var c2=b.getAttribute('data-ct');
      if(c2===CT){b.classList.add('on');b.style.background=cols[c2][0];b.style.color=cols[c2][1];}
      else{b.classList.remove('on');b.style.background='#F5F3EF';b.style.color='var(--muted)';}
    });uCE();return;}

  // Usage tags toggle
  var utag=t.closest('[data-utag]');
  if(utag){utag.classList.toggle('on');
    if(utag.classList.contains('on')){utag.style.background='var(--accent-l)';utag.style.color='var(--accent)';utag.style.borderColor='rgba(232,130,12,.3)';}
    else{utag.style.background='';utag.style.color='';utag.style.borderColor='transparent';}
    return;}

  // Remove photo
  if(t.closest('[data-rmphoto]')){var phv=document.getElementById('fphval');if(phv)phv.value='';
    var phc=t.closest('.fld');if(phc){var imgs=phc.querySelectorAll('img');imgs.forEach(function(i){i.remove()});}
    return;}
});

document.addEventListener('input',function(e){
  if(e.target.hasAttribute('data-search')){PS=e.target.value;
    var sv=e.target.selectionStart;R();
    var inp=document.querySelector('[data-search]');if(inp){inp.focus();inp.setSelectionRange(sv,sv);}
  }
  if(e.target.hasAttribute('data-encsearch')){wlSearch=e.target.value;
    var sv2=e.target.selectionStart;R();
    var inp2=document.querySelector('[data-encsearch]');if(inp2){inp2.focus();inp2.setSelectionRange(sv2,sv2);}
  }
  if(e.target.hasAttribute('data-rng')){D.settings[e.target.getAttribute('data-rng')]=parseInt(e.target.value);persist();R();}
});

document.addEventListener('change',function(e){
  if(e.target.id==='fph'&&e.target.files&&e.target.files[0]){
    compressPhoto(e.target.files[0],function(dataUrl){
      var phv=document.getElementById('fphval');if(phv)phv.value=dataUrl;
      var container=e.target.closest('.fld');
      var existing=container.querySelector('img');
      if(existing)existing.src=dataUrl;
      else{var img=document.createElement('img');img.src=dataUrl;img.style.cssText='width:60px;height:60px;border-radius:10px;object-fit:cover';container.querySelector('div').prepend(img);}
    });
  }
});
